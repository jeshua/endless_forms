<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Splitting Workbench</title>
    <base href="/frontend/">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <h1>Shape Splitting Workbench</h1>
            <a href="../index.html" class="back-link">← Back to Shape Gallery</a>

            <!-- Shape Selection -->
            <section class="panel">
                <h2>Shape</h2>
                <div class="control-group">
                    <label for="shape-select">Primitive:</label>
                    <select id="shape-select">
                        <option value="kite">Kite</option>
                        <option value="diamond" selected>Diamond</option>
                        <option value="sphere">Sphere</option>
                        <option value="cube">Cube</option>
                        <option value="cylinder">Cylinder</option>
                        <option value="star">Star</option>
                        <option value="crescent">Crescent</option>
                        <option value="hexagon">Hexagon</option>
                    </select>
                </div>
                <div id="shape-params"></div>
                <button id="generate-btn" class="primary">Generate Shape</button>
                <div class="separator"></div>
                <label class="file-upload">
                    <input type="file" id="upload-input" accept=".stl,.obj,.ply">
                    Upload Custom Mesh
                </label>
            </section>

            <!-- Splitting Controls -->
            <section class="panel">
                <h2>Splitting</h2>
                <div class="control-group">
                    <label for="splitter-select">Algorithm:</label>
                    <select id="splitter-select">
                        <option value="plane">Plane</option>
                        <option value="voronoi" selected>Voronoi</option>
                        <option value="radial">Radial</option>
                        <option value="convex">Convex</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="num-parts">Number of Parts:</label>
                    <input type="range" id="num-parts" min="2" max="8" value="3">
                    <span id="num-parts-value">3</span>
                </div>
                <div id="splitter-params"></div>
                <button id="split-btn" class="primary">Split</button>
                <button id="reset-btn" class="secondary">Reset</button>
            </section>

            <!-- View Controls -->
            <section class="panel">
                <h2>View</h2>
                <div class="control-group">
                    <label>
                        <input type="checkbox" id="exploded-view" checked>
                        Exploded View
                    </label>
                </div>
                <div class="control-group">
                    <label for="explode-distance">Explode Distance:</label>
                    <input type="range" id="explode-distance" min="0" max="100" value="30">
                </div>
                <div class="control-group">
                    <label>
                        <input type="checkbox" id="wireframe-view" checked>
                        Show Wireframe
                    </label>
                </div>
                <div class="control-group">
                    <label>
                        <input type="checkbox" id="show-original">
                        Show Original (ghost)
                    </label>
                </div>
            </section>

            <!-- Export -->
            <section class="panel">
                <h2>Export</h2>
                <div class="button-group">
                    <button id="export-stl-btn">Export STL</button>
                    <button id="export-gltf-btn">Export glTF</button>
                </div>
                <div id="export-parts"></div>
            </section>

            <footer>
                <p id="status">Ready</p>
            </footer>
        </aside>

        <main id="viewer-container">
            <canvas id="viewer"></canvas>
        </main>
    </div>

    <!-- Three.js from CDN -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/viewer.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
